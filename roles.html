<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ParkEase - User Roles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form">

        <img src="parkease_logo.png" class="logo">

        <h2>Assign User Role</h2>

        <form>
            <div class="section">
                <label>Username</label>
                <input type="text" required>
            </div>

            <div class="section">
                <label>Select Role</label>
                <select required>
                    <option>System Admin</option>
                    <option>Parking Attendant</option>
                    <option>Battery Manager</option>
                    <option>Tyre clinic Manager</option>
                </select>
            </div>

            <div class="section">
                <button type="submit" class="btn">Save Role</button>
            </div>
        </form>

    </div>

</body>
</html>
