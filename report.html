<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase_Daily Report</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main wrapper for daily report page -->
    <div class="form">

        <!-- Company logo -->
        <img src="parkease_logo.png" alt="ParkEase Logo" class="logo">

        <!-- Report title -->
        <h2>Daily Revenue Report</h2>

        <!-- Revenue summary section -->
        <div class="section">
            <p><strong>Date:</strong> 02 March 2026</p>
            <p><strong>Parking Revenue:</strong> UGX 150,000</p>
            <p><strong>Tyre Revenue:</strong> UGX 45,000</p>
            <p><strong>Battery Revenue:</strong> UGX 80,000</p>
            <p><strong>Total Revenue:</strong> UGX 275,000</p>
        </div>

        <!-- Signed-out vehicles heading -->
        <div class="section">
            <h3>Signed-Out Vehicles</h3>
        </div>

        <!-- Vehicles table section -->
        <div class="section">

            <table>

                <!-- Table header -->
                <tr>
                    <th>Receipt No</th>
                    <th>Number Plate</th>
                    <th>Vehicle Type</th>
                    <th>Amount</th>
                </tr>

                <!-- Sample vehicle row -->
                <tr>
                    <td>PK123456</td>
                    <td>UBA123A</td>
                    <td>Car</td>
                    <td>3000</td>
                </tr>

            </table>

        </div>

    </div>

</body>
</html>
