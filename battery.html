<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase - Battery Section</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main wrapper for battery section page -->
    <div class="form">

        <!-- Company logo -->
        <img src="parkease_logo.png" alt="ParkEase Logo" class="logo">

        <!-- Page title -->
        <h2>Battery Hire & Sales</h2>

        <!-- Battery transaction form -->
        <form>

            <!-- Vehicle type selection -->
            <div class="section">
                <label for="vehicle_type">Select Vehicle Type</label>
                <select id="vehicle_type" name="vehicle_type" required>
                    <option value="truck">Truck</option>
                    <option value="personal_car">Personal Car</option>
                    <option value="taxi">Taxi</option>
                    <option value="coaster">Coaster</option>
                    <option value="boda_boda">Boda-Boda</option>
                </select>
            </div>

            <!-- Transaction type selection -->
            <div class="section">
                <label for="transaction_type">Transaction Type</label>
                <select id="transaction_type" name="transaction_type" required>
                    <option value="hire">Hire</option>
                    <option value="sale">Sale</option>
                </select>
            </div>

            <!-- Battery model input -->
            <div class="section">
                <label for="battery_model">Battery Model</label>
                <input type="text" id="battery_model" name="battery_model" required>
            </div>

            <!-- Price input -->
            <div class="section">
                <label for="price">Price (UGX)</label>
                <input type="number" id="price" name="price" required>
            </div>

            <!-- Submit button -->
            <div class="section">
                <button type="submit" class="btn">Save Transaction</button>
            </div>

        </form>

    </div>

</body>
</html>
