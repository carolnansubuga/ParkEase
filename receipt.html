<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase_Receipt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main wrapper for receipt page -->
    <div class="form">

        <!-- Company logo -->
        <img src="parkease_logo.png" alt="ParkEase Logo" class="logo">

        <!-- Receipt title -->
        <h2>ParkEase Receipt</h2>

        <hr>

        <!-- Receipt details section -->
        <div class="section">
            <p><strong>Receipt No:</strong> PE1</p>
            <p><strong>Driver Name:</strong> Bukenya Jarud</p>
            <p><strong>Vehicle Type:</strong> Personal Car</p>
            <p><strong>Number Plate:</strong> UBA 123A</p>
            <p><strong>Arrival Time:</strong> 02 March 2026 - 10:30 AM</p>
            <p><strong>Amount Paid:</strong> UGX 3,000</p>
        </div>

        <hr>

        <!-- Thank you message -->
        <div class="section">
            <p>Thank you for choosing ParkEase!</p>
        </div>

        <!-- Print button -->
        <div class="section">
            <button class="btn" onclick="window.print()">Print Receipt</button>
        </div>

    </div>

</body>
</html>
