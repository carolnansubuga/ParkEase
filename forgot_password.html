<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ParkEase - Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form">

        <img src="parkease_logo.png" class="logo">

        <h2>Reset Password</h2>

        <form>
            <div class="section">
                <label>Email Address</label>
                <input type="email" required>
            </div>

            <div class="section">
                <button type="submit" class="btn">Send Reset Link</button>
            </div>
        </form>

    </div>

</body>
</html>
