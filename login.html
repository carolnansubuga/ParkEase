<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase_Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main wrapper for the login page -->
    <div class="form">

        <!-- Company logo -->
        <img src="parkease_logo.png" alt="ParkEase Logo" class="logo">

        <!-- Tagline text -->
        <h1>The right lot to get a spot.</h1>

        <!-- Login form -->
        <form>

            <!-- Form heading -->
            <p>Login to ParkEase</p>

            <!-- Username input field -->
            <div class="section">
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>

            <!-- Password input field -->
            <div class="section">
                <input type="password" id="passcode" name="passcode" placeholder="Enter password" required>
            </div>

            <!-- Login button -->
            <div class="section">
                <button type="submit" class="btn">Login</button>
            </div>

        </form>

    </div>

</body>

</html>
